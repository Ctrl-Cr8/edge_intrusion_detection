<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Sentinel IDS</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="corner-tl"></div>
<div class="corner-br"></div>

<!-- Header -->
<header>
  <div class="logo">
    <div class="logo-icon"></div>
    <div>
      <div class="logo-text">Silent Sentinel</div>
      <div class="logo-sub">INTRUSION DETECTION SYSTEM</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <div class="status-dot"></div>
      MONITORING
    </div>
    <div id="last-update">—</div>
  </div>
</header>

<!-- Stats bar -->
<div class="stats-bar">
  <div class="stat">
    <div class="stat-label">Total Alerts</div>
    <div class="stat-value" id="stat-total">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Attacks Detected</div>
    <div class="stat-value danger" id="stat-attacks">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">IPs Blocked</div>
    <div class="stat-value warn" id="stat-blocked">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Last Score</div>
    <div class="stat-value ok" id="stat-score">—</div>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Blocked IPs -->
  <div>
    <div class="section-header">
      <div class="section-title">Active Blocks</div>
    </div>
    <div class="blocks-panel">
      <div id="blocked-list">
        <span class="no-blocks">NO ACTIVE BLOCKS</span>
      </div>
    </div>
  </div>

  <!-- Alerts table -->
  <div>
    <div class="section-header">
      <div class="section-title">Alert Feed</div>
      <div style="font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);">
        AUTO-REFRESH 5s
      </div>
    </div>
    <div class="table-wrap">
      <div id="table-container">
        <div class="empty-state"><p>AWAITING TRAFFIC DATA...</p></div>
      </div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
